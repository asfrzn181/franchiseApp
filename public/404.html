<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Franchise App</title>
  <script>
    // GitHub Pages SPA Workaround
    // Simpan URL asli ke sessionStorage, lalu redirect ke root aplikasi.
    sessionStorage.redirect = location.href;
    
    // Ambil segment pertama dari path untuk path repository (misal: /franchise-app/)
    var pathSegments = window.location.pathname.split('/');
    var basePath = '/' + (pathSegments[1] || '') + '/';
    if (basePath === '//') basePath = '/';
    
    // Alihkan kembali ke route yang benar (index.html) tanpa menggunakan meta refresh
    window.location.replace(basePath);
  </script>
</head>
<body></body>
</html>
